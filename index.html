<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Моя ферма 🌱</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        padding: 12px;
        background: linear-gradient(to bottom, #87CEEB 0%, #F0F8FF 40%, #C6E2B5 100%);
        color: #333;
        margin: 0;
      }
      h2, h3 { margin-top: 0; }
      .balance {
        font-weight: bold;
        color: #2e7d32;
        margin-bottom: 15px;
        font-size: 18px;
      }
      .field {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 20px;
      }
      .plot {
        width: 64px;
        height: 64px;
        border: 2px solid #4caf50;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        cursor: pointer;
        border-radius: 6px;
      }
      button {
        display: block;
        width: 100%;
        padding: 12px;
        font-size: 16px;
        margin: 8px 0;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }
      .btn-plant { background: #4caf50; color: white; }
      .btn-harvest { background: #f57c00; color: white; }
      .btn-close { background: #607d8b; color: white; margin-top: 10px; }

      .shop-item, .quest-item {
        background: rgba(255,255,255,0.9);
        border: 1px solid #ddd;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 8px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .shop-name, .quest-name { font-weight: 500; }
      .shop-price, .quest-reward { color: #d32f2f; }
      .quest-done { opacity: 0.6; text-decoration: line-through; }

      /* экраны */
      .screen { display: none; }
      .screen.active { display: block; }

      #guild-screen, #shop-screen, #quests-screen {
        margin-top: 20px;
        padding: 10px;
        background: rgba(255,255,255,0.85);
        border-radius: 10px;
      }
    </style>
  </head>
