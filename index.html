<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Моя ферма 🌱</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        padding: 12px;
        background: linear-gradient(to bottom, #87CEEB 0%, #F0F8FF 40%, #C6E2B5 100%);
        color: #333;
        margin: 0;
      }
      h2, h3 { margin-top: 0; }
      .balance {
        font-weight: bold;
        color: #2e7d32;
        margin-bottom: 15px;
        font-size: 18px;
      }
      .field {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 20px;
      }
      .plot {
        width: 64px;
        height: 64px;
        border: 2px solid #4caf50;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        cursor: pointer;
        border-radius: 6px;
      }
      button {
        display: block;
        width: 100%;
        padding: 12px;
        font-size: 16px;
        margin: 8px 0;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }
      .btn-plant { background: #4caf50; color: white; }
      .btn-harvest { background: #f57c00; color: white; }
      .btn-close { background: #607d8b; color: white; margin-top: 10px; }

      .shop-item, .quest-item {
        background: rgba(255,255,255,0.9);
        border: 1px solid #ddd;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .quest-item { cursor: default; } /* теперь не кликабельный */
      .shop-name, .quest-name { font-weight: 500; }
      .shop-price, .quest-reward { color: #d32f2f; }
      .quest-done { opacity: 0.6; text-decoration: line-through; }
      .quest-progress { margin-left: 8px; font-size: 14px; color: #555; }

      /* экраны */
      .screen { display: none; }
      .screen.active { display: block; }

      #guild-screen, #shop-screen, #quests-screen {
        margin-top: 20px;
        padding: 10px;
        background: rgba(255,255,255,0.85);
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <h2>Моя ферма 🌱</h2>
    <div class="balance">Монет: <span id="coins">0</span></div>

    <!-- Навигация -->
    <button id="fieldBtn" class="btn-plant">Поле</button>
    <button id="shopBtn" class="btn-plant">Магазин</button>
    <button id="questsBtn" class="btn-plant">Задания</button>
    <button id="guildBtn" class="btn-plant">Гильдия</button>

    <!-- Экран: Поле -->
    <div id="field-screen" class="screen active">
      <h3>Поле</h3>
      <div class="field" id="field"></div>
      <button id="harvestBtn" class="btn-harvest">Собрать урожай</button>
    </div>

    <!-- Экран: Магазин -->
    <div id="shop-screen" class="screen">
      <h3>Магазин семян</h3>
      <div id="shop"></div>
    </div>

    <!-- Экран: Задания -->
    <div id="quests-screen" class="screen">
      <h3>Задания 📜</h3>
      <div id="quests"></div>
    </div>

    <!-- Экран: Гильдия -->
    <div id="guild-screen" class="screen">
      <h3>Гильдия 🏰</h3>
      <div style="background:rgba(255,255,255,0.9); padding:12px; border-radius:8px;">
        <p><b>Название гильдии:</b> <span id="guild-name">Не выбрана</span></p>
        <p><b>Уровень гильдии:</b> <span id="guild-level">0</span></p>
        <p><b>Очки гильдии:</b> <span id="guild-points">0</span></p>
      </div>
      <button id="create-guild-btn" class="btn-plant" style="margin-top:10px;">Создать гильдию</button>
      <button id="join-guild-btn" class="btn-harvest" style="margin-top:5px;">Вступить в гильдию</button>
    </div>

    <button id="closeBtn" class="btn-close">Закрыть игру</button>

    <script src="./script.js"></script>
  </body>
</html>
