<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Моя ферма</title>
    <!-- Подключаем Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        padding: 12px;
        background: #f0f8ff;
        color: #333;
        margin: 0;
      }
      h2, h3 { margin-top: 0; }
      .balance {
        font-weight: bold;
        color: #2e7d32;
        margin-bottom: 15px;
        font-size: 18px;
      }
      .field {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 20px;
      }
      .plot {
        width: 64px;
        height: 64px;
        border: 2px solid #4caf50;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        cursor: default;
        border-radius: 6px;
      }
      .controls {
        margin-top: 10px;
      }
      select, button {
        display: block;
        width: 100%;
        padding: 12px;
        font-size: 16px;
        margin: 8px 0;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }
      .btn-plant { background: #4caf50; color: white; }
      .btn-harvest { background: #f57c00; color: white; }
      .btn-close { background: #607d8b; color: white; margin-top: 10px; }
      .shop-item {
        background: white;
        border: 1px solid #ddd;
        padding: 8px;
        border-radius: 8px;
        margin-bottom: 6px;
      }
      .shop-price {
        color: #d32f2f;
        float: right;
      }
    </style>
  </head>
  <body>
    <h2>Моя ферма 🌱</h2>
    <div class="balance">Монет: <span id="coins">0</span></div>

    <h3>Магазин семян</h3>
    <div id="shop"></div>

    <h3>Поле</h3>
    <div class="field" id="field"></div>

    <button id="harvestBtn" class="btn-harvest">Собрать урожай</button>
    <button id="closeBtn" class="btn-close">Закрыть игру</button>

    <script src="./script.js"></script>
  </body>
</html>
