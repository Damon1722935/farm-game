<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ферма для квеста</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #2c3e50;
      color: #ecf0f1;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .game-container {
      width: 100%;
      max-width: 480px;
      background: #34495e;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      overflow: hidden;
      padding-bottom: 20px;
    }

    /* Экраны */
    .screen {
      display: none;
      padding: 15px;
      animation: fadeIn 0.3s ease;
    }
    .screen.active {
      display: block;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h3 {
      margin-top: 0;
      text-align: center;
      color: #f1c40f;
    }

    /* Поле */
    #field {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 15px 0;
    }
    .plot {
      height: 60px;
      border: 2px solid #bdc3c7;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .plot:hover {
      transform: scale(1.05);
    }

    /* Кнопки */
    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 15px;
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    .btn-plant { background: #2ecc71; color: white; }
    .btn-harvest { background: #f39c12; color: white; }
    .btn-close { background: #95a5a6; color: white; }

    /* Магазин */
    .shop-item {
      background: rgba(255,255,255,0.1);
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .shop-name { font-weight: bold; }
    .shop-price { color: #f1c40f; }

    /* Квесты */
    .quest-item {
      background: rgba(0,0,0,0.2);
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .quest-done {
      opacity: 0.6;
      text-decoration: line-through;
    }
    .quest-progress { color: #e74c3c; font-weight: bold; }
    .quest-reward { color: #f1c40f; font-weight: bold; }

    /* Гильдия */
    #guild-stats {
      background: rgba(255,255,255,0.9);
      color: #2c3e50;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    #guild-stats p {
      margin: 6px 0;
    }
    #guild-actions {
      margin-top: 15px;
    }

    /* Верх */
    .header-bar {
      padding: 10px 15px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .coins-display {
      font-size: 1.2rem;
      font-weight: bold;
      color: #f1c40f;
    }
  </style>
</head>
<body>

  <div class="game-container">
    <!-- Верхняя панель -->
    <div class="header-bar">
      <span>🌾 Ферма любви</span>
      <span class="coins-display">Монеты: <span id="coins">100</span></span>
    </div>

    <!-- Навигация (кнопки перехода между экранами) -->
    <div class="btn-group">
      <button id="fieldBtn">🌾 Поле</button>
      <button id="shopBtn">🛍 Магазин</button>
      <button id="questsBtn">📜 Квесты</button>
      <button id="guildBtn">🏰 Гильдия</button>
    </div>

    <!-- ЭКРАН: Поле -->
    <div id="field-screen" class="screen active">
      <h3>Поле</h3>
      <div id="field"></div>
      <button id="harvestBtn" class="btn-harvest" style="width:100%;">Собрать урожай</button>
    </div>

    <!-- ЭКРАН: Магазин -->
    <div id="shop-screen" class="screen">
      <h3>Магазин семян</h3>
      <div id="shop"></div>
    </div>

    <!-- ЭКРАН: Квесты -->
    <div id="quests-screen" class="screen">
      <h3>Квесты</h3>
      <div id="quests"></div>
    </div>

    <!-- ЭКРАН: Гильдия (кнопки ТОЛЬКО здесь, без дублей) -->
    <div id="guild-screen" class="screen">
      <h3>Гильдия 🏰</h3>

      <!-- Статистика гильдии (скрывается, если гильдии нет) -->
      <div id="guild-stats" style="display:block;">
        <p><b>Название гильдии:</b> <span id="guild-name">Не выбрана</span></p>
        <p><b>Лидер гильдии:</b> <span id="guild-leader">Не назначен</span></p>
        <p><b>Количество участников:</b> <span id="guild-members-count">0</span></p>
        <p><b>Уровень гильдии:</b> <span id="guild-level">0</span></p>
        <p><b>Очки гильдии:</b> <span id="guild-points">0</span></p>
      </div>

      <button id="create-guild-btn" class="btn-plant" style="margin-top:10px;">Создать гильдию</button>
      <button id="join-guild-btn" class="btn-harvest" style="margin-top:5px;">Вступить в гильдию</button>

      <div id="guild-actions" style="margin-top:15px; display:none;">
        <button id="leave-guild-btn" class="btn-close" style="width:auto; padding:8px 16px;">Выйти из гильдии</button>
        <button id="disband-guild-btn" class="btn-plant" style="width:auto; margin-left:8px; padding:8px 16px; background:#d32f2f;">Распустить гильдию</button>
      </div>
    </div>

    <!-- Кнопка закрытия (если нужно) -->
    <button id="closeBtn" style="display:none; width:100%; margin-top:10px;" class="btn-close">Закрыть</button>
  </div>

  <script>
    // --- Эмуляция Telegram для браузера ---
    let tg;
    if (window.Telegram && window.Telegram.WebApp) {
      tg = window.Telegram.WebApp;
      tg.ready();
    } else {
      console.warn('⚠️ Режим тестирования вне Telegram.');
      tg = {
        ready: () => console.log('Telegram SDK не загружен, эмуляция'),
        showAlert: (text) => alert(text),
        close: () => window.close() || console.log('Закрыть недоступно')
      };
    }
    // --------------------------------------

    const cropsConfig = {
      carrot: { name: 'Морковь', price: 20, reward: 30, emoji: '🥕' },
      wheat:  { name: 'Пшеница',  price: 30, reward: 50, emoji: '🌾' },
      strawberry: { name: 'Клубника', price: 50, reward: 80, emoji: '🍓' }
    };

    const questsConfig = [
      {
        id: 'q1',
        title: 'Прополоть первую грядку',
        reward: 50,
        secret: 'Ты делаешь всё правильно. Она точно это заметит.',
        done: false
      },
      {
        id: 'q2',
        title: 'Посадить 3 культуры',
        target: 3,
        reward: 70,
        secret: 'Это как первые слова: неловко, но важно сказать.',
        done: false
      },
      {
        id: 'q3',
        title: 'Собрать первый урожай',
        target: 1,
        reward: 100,
        secret: 'Иногда самое красивое признание — в простых делах.',
        done: false
      },
      {
        id: 'q4',
        title: 'Заработать 200 монет',
        target: 200,
        reward: 150,
        secret: 'Скоро ты сможешь сказать всё, что копил в сердце.',
        done: false
      }
    ];

    // Сброс данных при смене версии
    const currentVersion = 'v1.7';
    const storedVersion = localStorage.getItem('farm_version');
    if (storedVersion !== currentVersion) {
      localStorage.removeItem('farm_coins');
      localStorage.removeItem('farm_plots');
      localStorage.removeItem('farm_quests_progress');
      localStorage.removeItem('farm_guild_name');
      localStorage.removeItem('farm_guild_leader');
      localStorage.removeItem('farm_guild_members');
      localStorage.removeItem('farm_current_nick');
      localStorage.setItem('farm_version', currentVersion);
      console.log('🧹 Данные сброшены под новую версию игры.');
    }

    let coins = localStorage.getItem('farm_coins') ? parseInt(localStorage.getItem('farm_coins')) : 100;
    let plots = JSON.parse(localStorage.getItem('farm_plots')) || Array(6).fill(null);
    let selectedCropKey = 'carrot';

    let guildName = localStorage.getItem('farm_guild_name') || null;
    let guildLeader = localStorage.getItem('farm_guild_leader') || null;
    let guildMembers = JSON.parse(localStorage.getItem('farm_guild_members')) || [];
    let guildLevel = parseInt(localStorage.getItem('farm_guild_level')) || 0;
    let guildPoints = parseInt(localStorage.getItem('farm_guild_points')) || 0;

    let questsProgress = JSON.parse(localStorage.getItem('farm_quests_progress')) || {
      planted_total: 0,
      harvested_total: 0,
      earned_coins: 0
    };

    let currentNick = localStorage.getItem('farm_current_nick') || 'Игрок';

    // Элементы DOM
    const coinsEl = document.getElementById('coins');
    const field = document.getElementById('field');
    const harvestBtn = document.getElementById('harvestBtn');
    const closeBtn = document.getElementById('closeBtn');
    const guildBtn = document.getElementById('guildBtn');
    const fieldBtn = document.getElementById('fieldBtn');
    const shopBtn = document.getElementById('shopBtn');
    const questsBtn = document.getElementById('questsBtn');

    const guildScreen = document.getElementById('guild-screen');
    const guildNameEl = document.getElementById('guild-name');
    const guildLeaderEl = document.getElementById('guild-leader');
    const guildMembersCountEl = document.getElementById('guild-members-count');
    const guildLevelEl = document.getElementById('guild-level');
    const guildPointsEl = document.getElementById('guild-points');
    const createGuildBtn = document.getElementById('create-guild-btn');
    const joinGuildBtn = document.getElementById('join-guild-btn');
    const leaveGuildBtn = document.getElementById('leave-guild-btn');
    const disbandGuildBtn = document.getElementById('disband-guild-btn');
    const guildActions = document.getElementById('guild-actions');
    const statsBlock = document.getElementById('guild-stats');

    const shopContainer = document.getElementById('shop');
    const questsContainer = document.getElementById('quests');
    const fieldScreen = document.getElementById('field-screen');
    const shopScreen = document.getElementById('shop-screen');
    const questsScreen = document.getElementById('quests-screen');

    function saveProgress() {
      localStorage.setItem('farm_coins', coins.toString());
      localStorage.setItem('farm_plots', JSON.stringify(plots));
    }
    function saveGuild() {
      localStorage.setItem('farm_guild_name', guildName);
      localStorage.setItem('farm_guild_leader', guildLeader);
      localStorage.setItem('farm_guild_members', JSON.stringify(guildMembers));
      localStorage.setItem('farm_guild_level', guildLevel.toString());
      localStorage.setItem('farm_guild_points', guildPoints.toString());
    }
    function saveQuests() {
      localStorage.setItem('farm_quests_progress', JSON.stringify(questsProgress));
    }
    function saveCurrentNick() {
      localStorage.setItem('farm_current_nick', currentNick);
    }

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
      const screen = document.getElementById(screenId);
      if (screen) screen.classList.add('active');
    }

    fieldBtn.onclick = () => showScreen('field-screen');
    shopBtn.onclick = () => { renderShop(); showScreen('shop-screen'); };
    questsBtn.onclick = () => { renderQuests(); showScreen('quests-screen'); };
    guildBtn.onclick = () => { renderGuildInfo(); showScreen('guild-screen'); };

    function renderShop() {
      shopContainer.innerHTML = '';
      for (const key in cropsConfig) {
        const crop = cropsConfig[key];
        const item = document.createElement('div');
        item.className = 'shop-item';
        item.innerHTML = `<span class="shop-name">${crop.name}</span><span class="shop-price">${crop.price} монет</span>`;
        item.onclick = () => {
          selectedCropKey = key;
          showScreen('field-screen');
          tg.showAlert(`Выбрано: ${crop.name}. Теперь сажай на поле!`);
        };
        shopContainer.appendChild(item);
      }
    }

    function renderField() {
  field.innerHTML = '';
  plots.forEach((cropKey, i) => {
    const plot = document.createElement('div');
    plot.className = 'plot';
    if (cropKey) {
      const crop = cropsConfig[cropKey];
      plot.textContent = crop.emoji;
      if (cropKey === 'carrot') plot.style.background = '#ffca28';
      if (cropKey === 'wheat') plot.style.background = '#c5e1a5';
      if (cropKey === 'strawberry') plot.style.background = '#ffcdd2';
    } else {
      plot.style.background = '#ecf0f1'; // пустая грядка
      plot.textContent = '🌱';
    }
    plot.onclick = () => {
      if (cropKey) {
        // Если уже посажено — ничего не делаем (или можно добавить действие)
        return;
      }
      // Сажаем выбранную культуру
      plots[i] = selectedCropKey;
      questsProgress.planted_total = (questsProgress.planted_total || 0) + 1;
      saveProgress();
      saveQuests();
      checkQuests();
      renderField();
      tg.showAlert(`Ты посадил ${cropsConfig[selectedCropKey].name}!`);
    };
    field.appendChild(plot);
  });
  coinsEl.textContent = coins;
}

function checkQuests() {
  let newReward = false;
  let secretText = '';

  const q1 = questsConfig.find(q => q.id === 'q1');
  if (!q1.done && questsProgress.harvested_total >= 1) {
    q1.done = true;
    coins += q1.reward;
    secretText = q1.secret;
    newReward = true;
  }

  const q2 = questsConfig.find(q => q.id === 'q2');
  if (!q2.done) {
    const plantedTotal = questsProgress.planted_total || 0;
    if (plantedTotal >= q2.target) {
      q2.done = true;
      coins += q2.reward;
      secretText = q2.secret;
      newReward = true;
    }
  }

  const q3 = questsConfig.find(q => q.id === 'q3');
  if (!q3.done) {
    const harvestedTotal = questsProgress.harvested_total || 0;
    if (harvestedTotal >= q3.target) {
      q3.done = true;
      coins += q3.reward;
      secretText = q3.secret;
      newReward = true;
    }
  }

  const q4 = questsConfig.find(q => q.id === 'q4');
  if (!q4.done) {
    const earnedTotal = questsProgress.earned_coins || 0;
    if (earnedTotal >= q4.target) {
      q4.done = true;
      coins += q4.reward;
      secretText = q4.secret;
      newReward = true;
    }
  }

  if (newReward) {
    saveProgress();
    saveQuests();
    renderField();
    renderQuests();
    tg.showAlert(secretText);
  }
}

function renderQuests() {
  questsContainer.innerHTML = '';
  questsConfig.forEach(q => {
    const isDone = q.done;
    const item = document.createElement('div');
    item.className = `quest-item ${isDone ? 'quest-done' : ''}`;

    let progressText = '';
    if (!isDone) {
      if (q.id === 'q2') {
        const planted = questsProgress.planted_total || 0;
        progressText = `${planted}/${q.target}`;
      } else if (q.id === 'q3') {
        const harvested = questsProgress.harvested_total || 0;
        progressText = `${harvested}/${q.target}`;
      } else if (q.id === 'q4') {
        const earned = questsProgress.earned_coins || 0;
        progressText = `${earned}/${q.target} монет`;
      }
    }

    item.innerHTML = `
      <span class="quest-name">${q.title}</span>
      ${progressText ? `<span class="quest-progress">${progressText}</span>` : ''}
      <span class="quest-reward">${q.reward} монет</span>
    `;
    item.style.cursor = 'default';
    questsContainer.appendChild(item);
  });
}

function renderGuildInfo() {
  // Если гильдии нет — скрываем статистику, показываем только кнопки
  if (!guildName) {
    statsBlock.style.display = 'none';
    createGuildBtn.style.display = 'inline-block';
    joinGuildBtn.style.display = 'inline-block';
    guildActions.style.display = 'none';
    disbandGuildBtn.style.display = 'none';
    return;
  }

  // Гильдия есть — показываем статистику
  statsBlock.style.display = 'block';
  guildNameEl.textContent = guildName;
  guildLeaderEl.textContent = guildLeader || 'Не назначен';
  guildMembersCountEl.textContent = guildMembers.length;
  guildLevelEl.textContent = guildLevel;
  guildPointsEl.textContent = guildPoints;

  const isInGuild = guildMembers.includes(currentNick);

  // Блок действий (выход/роспуск) показываем только если игрок в гильдии
  guildActions.style.display = isInGuild ? 'block' : 'none';

  // Кнопка «Распустить» — только для лидера
  disbandGuildBtn.style.display = (isInGuild && guildLeader === currentNick) ? 'inline-block' : 'none';

  // Кнопка «Вступить» — скрываем, если игрок уже в гильдии
  joinGuildBtn.style.display = isInGuild ? 'none' : 'inline-block';
}

// Обработчики кнопок гильдии
createGuildBtn.onclick = () => {
  const name = prompt('Придумай название гильдии:');
  if (!name || name.trim() === '') return;

  const myNick = prompt('Твой никнейм в гильдии:', 'Игрок');
  const finalNick = myNick && myNick.trim() ? myNick.trim() : 'Игрок';

  currentNick = finalNick;
  saveCurrentNick();

  guildName = name.trim();
  guildLeader = finalNick;
  guildMembers = [finalNick];
  guildLevel = 1;
  guildPoints = 0;

  saveGuild();
  renderGuildInfo();
  tg.showAlert(`Гильдия «${guildName}» создана! Ты — лидер. Участников: 1.`);
};

joinGuildBtn.onclick = () => {
  if (!guildName) {
    tg.showAlert('Сейчас нет активной гильдии, в которую можно вступить. Сначала кто‑то должен её создать.');
    return;
  }

  const name = prompt('Введи свой никнейм для вступления в гильдию:', 'Гость');
  const nick = name && name.trim() ? name.trim() : 'Гость';

  if (nick === '') {
    tg.showAlert('Никнейм не может быть пустым.');
    return;
  }

  if (guildMembers.includes(nick)) {
    tg.showAlert('Такой ник уже есть в гильдии!');
    return;
  }

  currentNick = nick;
  saveCurrentNick();

  guildMembers.push(nick);
  saveGuild();
  renderGuildInfo();
  tg.showAlert(`Ты вступил в гильдию «${guildName}»! Теперь участников: ${guildMembers.length}.`);
};

leaveGuildBtn.onclick = () => {
  if (!guildName || !guildMembers.includes(currentNick)) {
    tg.showAlert('Ты не состоишь в гильдии.');
    return;
  }

  if (currentNick === guildLeader) {
    // Лидер уходит — гильдия распускается
    guildName = null;
    guildLeader = null;
    guildMembers = [];
    guildLevel = 0;
    guildPoints = 0;

    saveGuild();
    renderGuildInfo();
    tg.showAlert('Ты был лидером и распустил гильдию. Всё сброшено.');
    return;
  }

  // Обычный участник выходит
  guildMembers = guildMembers.filter(nick => nick !== currentNick);
  saveGuild();
  renderGuildInfo();
  tg.showAlert('Ты вышел из гильдии.');
};

disbandGuildBtn.onclick = () => {
  if (currentNick !== guildLeader) {
    tg.showAlert('Только лидер может распустить гильдию!');
    return;
  }
  if (!confirm('Ты точно хочешь распустить гильдию? Все данные гильдии будут удалены.')) {
    return;
  }

  guildName = null;
  guildLeader = null;
  guildMembers = [];
  guildLevel = 0;
  guildPoints = 0;

  saveGuild();
  renderGuildInfo();
  tg.showAlert('Гильдия распущена. Теперь можно создать новую или вступить в другую.');
};

// Инициализация
if (plots.length !== 6) {
  plots = Array(6).fill(null);
  saveProgress();
}
renderShop();
renderField();
renderQuests();
renderGuildInfo();

// Кнопка «Собрать урожай»
harvestBtn.onclick = () => {
  let harvested = 0;
  plots.forEach((cropKey, i) => {
    if (cropKey) {
      const crop = cropsConfig[cropKey];
      coins += crop.reward;
      harvested++;
      plots[i] = null; // убираем урожай
    }
  });

  if (harvested > 0) {
    questsProgress.harvested_total = (questsProgress.harvested_total || 0) + harvested;
    questsProgress.earned_coins = (questsProgress.earned_coins || 0) + (coins - (localStorage.getItem('farm_coins') ? parseInt(localStorage.getItem('farm_coins')) : 100));
    saveProgress();
    saveQuests();
    checkQuests();
    renderField();
    tg.showAlert(`Собран урожай! Получено монет: ${harvested * 30} (примерно).`);
  } else {
    tg.showAlert('На поле ничего не растёт — сначала посади что-нибудь!');
  }
};
